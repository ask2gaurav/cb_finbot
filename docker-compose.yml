services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant/config.yaml:/qdrant/config/custom_config.yaml:ro

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
          

  backend:
    image: ask2gaurav/codebasics_a1_backend
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGODB_URI: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017"
      QDRANT_HOST: qdrant
    healthcheck:
      # The command to run inside the container
      #test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      #python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s        # Time between checks
      timeout: 10s         # Time to wait for a response
      retries: 3           # Failures needed to mark "unhealthy"
      start_period: 5s     # Grace period for the app to start
    depends_on:
      - mongodb
      - qdrant
    develop:
      watch:
        - path: ./backend/requirements.txt
          action: rebuild
        - path: ./backend
          action: sync
          target: /app
          ignore:
            - __pycache__/
            - .venv/
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: ask2gaurav/codebasics_a1_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: builder
    command: pnpm dev --host 0.0.0.0 --port 3000
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
     backend:
       condition: service_healthy
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/pnpm-lock.yaml
          action: rebuild
        - path: ./frontend
          action: sync
          target: /app
          ignore:
            - node_modules/


